<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contento24</title>
    <link rel="stylesheet" href="./resources/style.css" />
    <link
      rel="shortcut icon"
      href="./resources/favicon.png"
      type="image/x-icon"
    />
  </head>
  <body>
    <div class="chat-container">
      <div class="chat-header">
        <a
          href="https://867678.xyz/project/contento24"
          target="_blank"
          rel="noopener noreferrer"
          class="ctt24"
          >🌐 Contento24</a
        >
        <div class="config-area">
          <label
            for="nickname"
            style="font-size: 0.85rem; color: var(--meta-color)"
            >昵称:</label
          >
          <input
            type="text"
            id="nickname"
            value="匿名用户"
            placeholder="输入你的昵称"
            maxlength="30"
          />
          <span id="connection-status" role="status">连接中…</span>
        </div>
      </div>
      <div class="chat-messages" id="chatbox"></div>
      <div class="chat-input-area">
        <textarea
          id="message"
          placeholder="按 Enter 发送消息，Shift+Enter 换行"
          rows="1"
          maxlength="2000"
        ></textarea>
        <button id="send-button" type="button" disabled>发送</button>
      </div>
    </div>
    <script src="./resources/index.js"></script>
  </body>
</html>
